name = "j2api"
main = "src/index.js"
compatibility_date = "2026-05-21"

# The worker serves UPSTREAM_PATH and proxies to UPSTREAM_BASE + UPSTREAM_PATH,
# so a route swap can replace the original endpoint without changing callers.
# Example route binding (uncomment and set zone_id):
# routes = [
#   { pattern = "www.jet2holidays.com/api/jet2/hotels/getfilteredhotels", zone_id = "<zone-id>" }
# ]

[vars]
UPSTREAM_BASE = "https://www.jet2holidays.com"
UPSTREAM_PATH = "/api/jet2/hotels/getfilteredhotels"
CACHED_PATH = "/api/jet2/hotels/getcachedhotels"

[[d1_databases]]
binding = "DB"
database_name = "j2api-cache"
database_id = "270ed787-0236-41d2-8368-2a459761abe8"
